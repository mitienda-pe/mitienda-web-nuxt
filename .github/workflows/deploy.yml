name: Deploy Nuxt SSR to Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            cd /var/www/mitienda-web-nuxt

            echo ">>> Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            echo ">>> Writing .env..."
            printf 'NUXT_API_TOKEN=${{ secrets.NUXT_API_TOKEN }}\nNUXT_MTSERVICIOS_URL=${{ secrets.NUXT_MTSERVICIOS_URL }}\nNUXT_MTSERVICIOS_API_KEY=${{ secrets.NUXT_MTSERVICIOS_API_KEY }}\nNUXT_PUBLIC_CHAT_WIDGET_URL=${{ secrets.NUXT_PUBLIC_CHAT_WIDGET_URL }}\n' > .env

            echo ">>> Installing dependencies..."
            npm ci --prefer-offline 2>&1 | tail -3

            echo ">>> Building..."
            export $(grep -v '^#' .env | xargs)
            npm run build 2>&1 | tail -5

            echo ">>> Restarting PM2..."
            pm2 restart mitienda --update-env 2>/dev/null || pm2 start .output/server/index.mjs --name mitienda
            pm2 save --force

            # Note: Caddyfile is managed manually on the server
            # To update: sudo cp Caddyfile /etc/caddy/Caddyfile && sudo systemctl reload caddy

            echo ">>> Deploy complete!"
