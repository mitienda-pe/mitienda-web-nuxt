name: Deploy Nuxt SSR to Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 5m
          script: |
            cd /var/www/mitienda-web-nuxt

            git fetch origin
            git reset --hard origin/main

            printf 'NUXT_API_TOKEN=${{ secrets.NUXT_API_TOKEN }}\nNUXT_MTSERVICIOS_URL=${{ secrets.NUXT_MTSERVICIOS_URL }}\nNUXT_MTSERVICIOS_API_KEY=${{ secrets.NUXT_MTSERVICIOS_API_KEY }}\nNUXT_PUBLIC_CHAT_WIDGET_URL=${{ secrets.NUXT_PUBLIC_CHAT_WIDGET_URL }}\n' > .env

            npm install

            export $(grep -v '^#' .env | xargs)
            npx nuxt build &
            BUILD_PID=$!
            sleep 60
            kill $BUILD_PID 2>/dev/null || true

            pm2 delete mitienda || true
            pm2 start .output/server/index.mjs --name mitienda
            pm2 save
