name: Deploy Nuxt SSR to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "📦 Entrando al proyecto..."
            cd /var/www/mitienda-web-nuxt

            echo "🔄 Actualizando código..."
            git fetch origin
            git reset --hard origin/main

            echo "📥 Instalando dependencias..."
            npm install

            echo "🏗️ Build de producción..."
            npm run build

            echo "♻️ Reiniciando app con PM2..."
            pm2 delete mitienda || true
            pm2 start .output/server/index.mjs --name mitienda
            pm2 save

            echo "🔁 Recargando Caddy..."
            sudo systemctl reload caddy

            echo "✅ Deploy completado"
