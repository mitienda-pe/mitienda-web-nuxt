name: Deploy Nuxt SSR to Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd /var/www/mitienda-web-nuxt

            git fetch origin
            git reset --hard origin/main

            printf 'NUXT_API_TOKEN=${{ secrets.NUXT_API_TOKEN }}\nNUXT_MTSERVICIOS_URL=${{ secrets.NUXT_MTSERVICIOS_URL }}\nNUXT_MTSERVICIOS_API_KEY=${{ secrets.NUXT_MTSERVICIOS_API_KEY }}\nNUXT_PUBLIC_CHAT_WIDGET_URL=${{ secrets.NUXT_PUBLIC_CHAT_WIDGET_URL }}\n' > .env

            export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
            npm ci --no-audit --no-fund
            export $(grep -v '^#' .env | xargs)
            node node_modules/nuxt/bin/nuxt.mjs build

            pm2 reload mitienda --update-env --silent </dev/null >/dev/null 2>&1 \
              || pm2 start .output/server/index.mjs --name mitienda --silent </dev/null >/dev/null 2>&1
            pm2 save --silent </dev/null >/dev/null 2>&1
            exit 0
