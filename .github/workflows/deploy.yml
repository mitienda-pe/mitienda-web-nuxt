name: Deploy Nuxt SSR to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: NUXT_API_TOKEN,NUXT_MTSERVICIOS_URL,NUXT_MTSERVICIOS_API_KEY,NUXT_PUBLIC_CHAT_WIDGET_URL
          script: |
            set -e

            cd /var/www/mitienda-web-nuxt

            echo "Actualizando codigo..."
            git fetch origin
            git reset --hard origin/main

            echo "Escribiendo .env..."
            echo "NUXT_API_TOKEN=${NUXT_API_TOKEN}" > .env
            echo "NUXT_MTSERVICIOS_URL=${NUXT_MTSERVICIOS_URL}" >> .env
            echo "NUXT_MTSERVICIOS_API_KEY=${NUXT_MTSERVICIOS_API_KEY}" >> .env
            echo "NUXT_PUBLIC_CHAT_WIDGET_URL=${NUXT_PUBLIC_CHAT_WIDGET_URL}" >> .env

            echo "Instalando dependencias..."
            npm install

            echo "Build de produccion..."
            npm run build

            echo "Reiniciando app con PM2..."
            pm2 delete mitienda || true
            pm2 start .output/server/index.mjs --name mitienda
            pm2 save

            echo "Recargando Caddy..."
            sudo systemctl reload caddy

            echo "Deploy completado"
