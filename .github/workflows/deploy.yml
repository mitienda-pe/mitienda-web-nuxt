name: Deploy Nuxt SSR to Server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 15m
          script: |
            cd /var/www/mitienda-web-nuxt

            git fetch origin
            git reset --hard origin/main

            printf 'NUXT_API_TOKEN=${{ secrets.NUXT_API_TOKEN }}\nNUXT_MTSERVICIOS_URL=${{ vars.NUXT_MTSERVICIOS_URL }}\nNUXT_MTSERVICIOS_API_KEY=${{ secrets.NUXT_MTSERVICIOS_API_KEY }}\n' > .env

            export PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD=1
            npm ci --no-audit --no-fund
            export $(grep -v '^#' .env | xargs)

            : > /tmp/nuxt-build.log
            node node_modules/nuxt/bin/nuxt.mjs build > /tmp/nuxt-build.log 2>&1 &
            BUILD_PID=$!
            while kill -0 $BUILD_PID 2>/dev/null; do
              if grep -q "Build complete!" /tmp/nuxt-build.log; then
                sleep 3
                kill $BUILD_PID 2>/dev/null
                break
              fi
              sleep 2
            done
            wait $BUILD_PID 2>/dev/null || true
            tail -5 /tmp/nuxt-build.log

            pm2 delete mitienda --silent </dev/null >/dev/null 2>&1 || true
            pm2 start .output/server/index.mjs --name mitienda --silent </dev/null >/dev/null 2>&1
            pm2 save --silent </dev/null >/dev/null 2>&1
            exit 0
