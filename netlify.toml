[build]
  # Netlify auto-detecta pnpm-lock.yaml y usa pnpm (versión via packageManager).
  command = "pnpm build"
  publish = ".output/public"

[build.environment]
  # pnpm 11 requiere Node >=22.13 (usa node:sqlite builtin).
  NODE_VERSION = "22"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_nuxt/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/mp4/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
